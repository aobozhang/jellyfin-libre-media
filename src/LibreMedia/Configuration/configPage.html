<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LibreMedia</title>
</head>
<body>
    <div id="LibreMediaConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="LibreMediaConfigForm">
                    <h3>Content Sources</h3>
                    <div id="contentSourcesList"></div>
                    <button is="emby-button" type="button" id="addSourceBtn" class="raised button-subtle block emby-button">
                        <span>+ Add Source</span>
                    </button>

                    <hr style="margin: 2em 0;" />

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="SyncIntervalMinutes">Sync Interval (minutes)</label>
                        <input id="SyncIntervalMinutes" name="SyncIntervalMinutes" type="number" is="emby-input" min="5" />
                    </div>

                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="EnableAutoSync" name="EnableAutoSync" type="checkbox" is="emby-checkbox" />
                            <span>Enable Auto Sync</span>
                        </label>
                    </div>

                    <div style="margin-top: 1.5em;">
                        <button is="emby-button" type="button" id="syncNowBtn" class="raised button-subtle block emby-button">
                            <span>Sync Now</span>
                        </button>
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button" style="margin-top: 2em;">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var LibreMediaConfig = {
                pluginUniqueId: 'c3d4e5f6-7890-abcd-ef12-345678901234'
            };

            function htmlEncode(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function generateId() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }

            function createSourceRow(sourceData, index) {
                var div = document.createElement('div');
                div.className = 'source-item';
                div.dataset.sourceId = sourceData.Id || generateId();
                div.dataset.index = index;

                var nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'source-name';
                nameInput.setAttribute('is', 'emby-input');
                nameInput.setAttribute('data-index', index);
                nameInput.value = sourceData.Name || '';

                var urlInput = document.createElement('input');
                urlInput.type = 'text';
                urlInput.className = 'source-apiurl';
                urlInput.setAttribute('is', 'emby-input');
                urlInput.setAttribute('data-index', index);
                urlInput.value = sourceData.ApiUrl || '';
                urlInput.style.width = '100%';

                var enabledCb = document.createElement('input');
                enabledCb.type = 'checkbox';
                enabledCb.className = 'source-enabled';
                enabledCb.setAttribute('is', 'emby-checkbox');
                enabledCb.setAttribute('data-index', index);
                enabledCb.checked = sourceData.IsEnabled !== false;

                var removeBtn = document.createElement('button');
                removeBtn.setAttribute('is', 'emby-button');
                removeBtn.setAttribute('type', 'button');
                removeBtn.className = 'raised button-danger remove-source-btn';
                removeBtn.setAttribute('data-index', index);
                removeBtn.textContent = 'Remove';
                removeBtn.style.marginTop = '0.5em';
                removeBtn.addEventListener('click', function() {
                    div.remove();
                });

                var nameLabel = document.createElement('label');
                nameLabel.className = 'inputLabel inputLabelUnfocused';
                nameLabel.textContent = 'Name';

                var urlLabel = document.createElement('label');
                urlLabel.className = 'inputLabel inputLabelUnfocused';
                urlLabel.textContent = 'API URL';
                urlLabel.style.marginTop = '0.5em';

                var enabledLabel = document.createElement('label');
                enabledLabel.className = 'emby-checkbox-label';
                enabledLabel.style.marginTop = '0.5em';

                var enabledSpan = document.createElement('span');
                enabledSpan.textContent = 'Enabled';

                var nameContainer = document.createElement('div');
                nameContainer.className = 'inputContainer';
                nameContainer.appendChild(nameLabel);
                nameContainer.appendChild(nameInput);

                var urlContainer = document.createElement('div');
                urlContainer.className = 'inputContainer';
                urlContainer.style.marginTop = '0.5em';
                urlContainer.appendChild(urlLabel);
                urlContainer.appendChild(urlInput);

                var enabledContainer = document.createElement('div');
                enabledContainer.className = 'checkboxContainer';
                enabledContainer.style.marginTop = '0.5em';
                enabledLabel.appendChild(enabledCb);
                enabledLabel.appendChild(enabledSpan);
                enabledContainer.appendChild(enabledLabel);

                div.appendChild(nameContainer);
                div.appendChild(urlContainer);
                div.appendChild(enabledContainer);
                div.appendChild(removeBtn);

                return div;
            }

            function loadConfig() {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(LibreMediaConfig.pluginUniqueId).then(function(config) {
                    document.getElementById('SyncIntervalMinutes').value = config.SyncIntervalMinutes || 60;
                    document.getElementById('EnableAutoSync').checked = config.EnableAutoSync !== false;

                    var list = document.getElementById('contentSourcesList');
                    list.innerHTML = '';
                    var sources = config.ContentSources || [];
                    sources.forEach(function(source, i) {
                        var row = createSourceRow(source, i);
                        list.appendChild(row);
                    });

                    Dashboard.hideLoadingMsg();
                }).catch(function(err) {
                    Dashboard.hideLoadingMsg();
                    console.error('Failed to load config:', err);
                });
            }

            function getSourcesFromDom() {
                var sources = [];
                var items = document.querySelectorAll('.source-item');
                items.forEach(function(item) {
                    var nameInput = item.querySelector('.source-name');
                    var urlInput = item.querySelector('.source-apiurl');
                    var enabledCb = item.querySelector('.source-enabled');
                    if (nameInput) {
                        sources.push({
                            Id: item.dataset.sourceId || generateId(),
                            Name: nameInput.value || '',
                            ApiUrl: urlInput ? urlInput.value || '' : '',
                            IsEnabled: enabledCb ? enabledCb.checked : true
                        });
                    }
                });
                return sources;
            }

            document.querySelector('#LibreMediaConfigPage').addEventListener('pageshow', loadConfig);

            document.getElementById('addSourceBtn').addEventListener('click', function() {
                var list = document.getElementById('contentSourcesList');
                var idx = list.children.length;
                var newSource = { Name: '', ApiUrl: '', IsEnabled: true };
                var row = createSourceRow(newSource, idx);
                list.appendChild(row);
            });

            document.getElementById('syncNowBtn').addEventListener('click', function() {
                Dashboard.showLoadingMsg();
                ApiClient.ajax({
                    type: 'POST',
                    url: ApiClient.getUrl('LibreMedia/Sync')
                }).then(function() {
                    Dashboard.hideLoadingMsg();
                    require(['alert'], function(alert) {
                        alert('Sync completed');
                    });
                }).catch(function(err) {
                    Dashboard.hideLoadingMsg();
                    console.error('Sync failed:', err);
                });
            });

            document.querySelector('#LibreMediaConfigForm').addEventListener('submit', function(e) {
                e.preventDefault();
                Dashboard.showLoadingMsg();

                var configData = {
                    ContentSources: getSourcesFromDom(),
                    SyncIntervalMinutes: parseInt(document.getElementById('SyncIntervalMinutes').value) || 60,
                    EnableAutoSync: document.getElementById('EnableAutoSync').checked
                };

                ApiClient.updatePluginConfiguration(LibreMediaConfig.pluginUniqueId, configData).then(function(result) {
                    Dashboard.processPluginConfigurationUpdateResult(result);
                    Dashboard.hideLoadingMsg();
                    loadConfig();
                }).catch(function(err) {
                    Dashboard.hideLoadingMsg();
                    console.error('Save failed:', err);
                    require(['alert'], function(alert) {
                        alert('Save failed: ' + (err.message || String(err)));
                    });
                });
            });
        </script>
    </div>
</body>
</html>
